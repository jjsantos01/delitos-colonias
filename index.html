<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delitos por Colonia CDMX</title>
    <meta name="description" content="Consulta los delitos reportados en tu colonia de la Ciudad de México. Datos abiertos con gráficas, mapas y comparativas trimestrales.">
    <meta property="og:title" content="Delitos por Colonia CDMX">
    <meta property="og:description" content="Consulta los delitos reportados por colonia en CDMX con datos oficiales abiertos.">
    <meta property="og:type" content="website">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <link href="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/css/tom-select.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/css/tom-select.default.css" rel="stylesheet">

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>

    <link rel="stylesheet" href="style.css">
</head>
<body class="dark-theme">

<header class="app-header">
    <div class="header-inner">
        <div class="header-brand">
            <span class="header-shield">🛡️</span>
            <div class="header-text">
                <h1 class="app-title">Reporte trimestral de delitos por colonia en CDMX</h1>
                <p class="app-subtitle">Consulta los delitos reportados en tu colonia</p>
            </div>
        </div>
    </div>
</header>

<div class="dashboard-container">
<aside class="sidebar" id="sidebar-filters">

<div class="primary-filters">
    <div class="control-group">
        <label for="alcaldia-select">Alcaldía</label>
        <select id="alcaldia-select"></select>
    </div>

    <div class="control-group">
        <label for="colonia-select">Colonia</label>
        <select id="colonia-select" disabled></select>
    </div>

    <div class="control-group">
        <label for="trimestre-select">Trimestre (KPIs y Mapa)</label>
        <select id="trimestre-select" disabled></select>
    </div>

    <!-- NUEVO: toggle visible -->
    <div class="control-group">
        <label class="neighbors-toggle-label">
            <input type="checkbox" id="toggle-neighbors-cb">
            <span>Incluir colonias vecinas</span>
        </label>
    </div>
</div>

<details class="advanced-filters" id="advanced-filters">
    <summary>⚙️ Filtros avanzados</summary>
    <div class="advanced-filters-body">

        <!-- SOLO panel permanece -->
        <div class="control-group neighbors-control" id="neighbors-control" style="display: none;">
            <div id="neighbors-panel" class="neighbors-panel" style="display: none;">
                <div class="neighbors-header">
                    <span class="neighbors-title">Vecinas (<span id="neighbors-count">0</span>)</span>
                    <label>
                        <input type="checkbox" id="toggle-all-neighbors" checked> Todas
                    </label>
                </div>
                <div id="neighbors-checkboxes"></div>
            </div>
        </div>

    </div>
</details>

</aside>
</div>

<script type="module" src="app.js"></script>
</body>
</html>
