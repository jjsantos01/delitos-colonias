name: Update Catalog JSON

on:
  schedule:
    - cron: '0 0 1 * *' # Run at 00:00 on the 1st of every month
  workflow_dispatch: # Allow manual trigger

jobs:
  update-catalog:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run update script
        run: python scripts/update_catalog.py

      - name: Check for changes
        id: check_changes
        run: |
          if git diff --exit-code catalog.json; then
            echo "No changes detected in catalog.json"
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "Changes detected in catalog.json"
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push changes
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add catalog.json
          git commit -m "chore: auto-update catalog.json from CKAN"
          git push
